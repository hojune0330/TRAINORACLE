<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Index Card Header</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../colors_and_type_journal.css">
<style>
  html, body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); }
  .wrap { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .a, .b { background: var(--surface); }
  .b .meta { color: var(--ink-blue); }
  .label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="idx-card a">
    <span class="date">2026 · 06 · 22</span>
    <span class="day-of-week">MON · 22℃ · 흐림</span>
    <span class="meta">CYCLE 07 · D—5·6/7</span>
  </div>
  <div class="label">— variant · race day</div>
  <div class="idx-card b">
    <span class="date">2026 · 06 · 21</span>
    <span class="day-of-week">SUN · 19℃ · 맑음</span>
    <span class="meta">RACE · 전국체전 5000m</span>
  </div>
</div>
</body>
</html>
