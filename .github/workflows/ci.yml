name: TrainOracle CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            runtime-evidence/d9-evaluator/package-lock.json
            impl/package-lock.json

      - name: Validate reasoning-tier work harness
        run: |
          node --test specs/test-packages/reasoning-tier-harness.test.mjs
          node specs/test-packages/reasoning-tier-harness.mjs validate
          node specs/test-packages/validate-formal-approval-foundation.mjs
          node specs/test-packages/validate-formation-p1-target-plans.mjs
          node specs/test-packages/test-wo016-gate-verifier.mjs

      - name: Install D9 evaluator dependencies
        working-directory: runtime-evidence/d9-evaluator
        run: npm ci

      - name: Run D9 evaluator evidence tests
        working-directory: runtime-evidence/d9-evaluator
        run: npm test

      - name: Install impl dependencies
        working-directory: impl
        run: npm ci

      - name: Typecheck impl skeleton
        working-directory: impl
        run: npm run typecheck

      - name: Run impl skeleton tests
        working-directory: impl
        run: npm test

  app-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Run app unit tests
        working-directory: app
        run: npm test

      - name: Typecheck app and browser tests
        working-directory: app
        run: |
          npm run typecheck
          npm run typecheck:e2e

      - name: Build production app
        working-directory: app
        run: npm run build

  app-browser:
    needs: app-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Install Chromium
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Run app browser scenarios
        working-directory: app
        run: npm run test:e2e

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - contract-tests
      - app-quality
      - app-browser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: trainoracle-pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build hosted app
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Publish verified build to gh-pages
        shell: bash
        run: |
          git fetch origin gh-pages
          git worktree add "$RUNNER_TEMP/trainoracle-pages" origin/gh-pages
          find "$RUNNER_TEMP/trainoracle-pages" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R app/dist/. "$RUNNER_TEMP/trainoracle-pages/"
          touch "$RUNNER_TEMP/trainoracle-pages/.nojekyll"
          cd "$RUNNER_TEMP/trainoracle-pages"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Hosted build is already current."
            exit 0
          fi
          git commit -m "deploy: verified app from main ${GITHUB_SHA::7}"
          git push origin HEAD:gh-pages
